site_name: Numen-rpg wiki
repo_url: https://github.com/Vergenter/numen-rpg_wiki

theme:
  name: material
  language: pl
  features:
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - footnotes
  - attr_list
  - def_list
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - awesome-pages
  - glightbox
  - minify:
      minify_html: true

extra_css:
  - styles/extra.css

exclude_docs: |
  tags.md
  creatures/**
  engineering/**
  indexes/**
  metaphysics/**
  rules/**
  world/**
  editorial/changelog.md
  editorial/style.md
  editorial/writing-guide.md

nav:
